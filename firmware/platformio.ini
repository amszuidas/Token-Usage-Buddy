[platformio]
default_envs = m5stack-core2

[env]
lib_deps =
  m5stack/M5Unified@^0.2.5
  h2zero/NimBLE-Arduino@^1.4.3
  bblanchon/ArduinoJson@^7.4.1

[env:m5stack-core2]
platform = espressif32
board = m5stack-core2
framework = arduino
monitor_speed = 115200
build_flags =
  -std=gnu++17
build_unflags =
  -std=gnu++11

[env:native]
platform = native
test_framework = unity
lib_deps =
build_flags =
  -std=gnu++17
  -D UNIT_TEST
build_unflags =
  -std=gnu++11
test_ignore =
  test_wire_protocol
